name: UniversalPluginUpdater
version: ${project.version}
main: me.dreamvoid.universalpluginupdater.bukkit.BukkitPlugin
author: DreamVoid
description: A plugin that updates other plugins on the server.
api-version: 1.13
load: STARTUP
prefix: UPU
commands:
  universalpluginupdater:
    description: 插件更新管理命令
    aliases:
      - upu
    usage: /<command> <update|download|upgrade>
    permission: universalpluginupdater.command

permissions:
  universalpluginupdater.command:
    description: 允许使用所有UPU命令
    default: op
    children:
      universalpluginupdater.command.update:
        description: 允许使用update命令
        default: op
      universalpluginupdater.command.download:
        description: 允许使用download命令
        default: op
      universalpluginupdater.command.upgrade:
        description: 允许使用upgrade命令
        default: op
